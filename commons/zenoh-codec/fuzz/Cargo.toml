[package]
name = "zenoh-codec-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
zenoh-buffers = { path = "../../zenoh-buffers" }
zenoh-codec = { path = ".." }
zenoh-protocol = { path = "../../zenoh-protocol" }

[workspace]
members = ["."]

[[bin]]
name = "transport_message"
path = "fuzz_targets/transport_message.rs"
test = false
doc = false
bench = false
